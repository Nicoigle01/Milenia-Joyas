<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto milenia joyas</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <img src="../img/mileniaJoyasChico.jpg" alt="Logo de Milenia Joyas" class="logo">
        <a href="../index.html">
            <h1 class="titulo">Milenia Joyas</h1>
        </a>
        <nav>
            <ul>
                <li><a href="../index.html">Inicio</a></li>
            </ul>
        </nav>
    </header>
    <form id="Contacto" novalidate>
        <div>
            <label for="full-name">Nombre y apellido:</label>
            <input type="text" id="full-name" name="full-name" placeholder="Ingrese su nombre y apellido" required>
        </div>
        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" aria-describedby="email-help" placeholder="Ingrese su email"
                required>

            <p aria-describedby="email-help">Ingrese su dirección de email válida.</p>

        </div>
    </form>
    <footer>
        <p>Numero de contacto <a href="https://wa.me/5491132017045">+54 9 11 3201-7045</a></p>
        <a href="../index.html">Regresar a la pagina principal</a>

    </footer>
</body>

</html>
